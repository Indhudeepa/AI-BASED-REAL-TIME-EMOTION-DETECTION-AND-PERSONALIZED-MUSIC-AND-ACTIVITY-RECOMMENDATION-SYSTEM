<!DOCTYPE html>
<html>

<head>

<title>Recommendations</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,red,yellow,orange);
background-size:400% 400%;
animation:gradientMove 10s infinite alternate;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

h1{
margin-top:40px;
color:white;
font-size:40px;
}

.container{
margin-top:40px;
}

.card{
background:white;
width:40%;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0px 5px 20px rgba(0,0,0,0.3);
animation:pop 0.8s ease;
}

@keyframes pop{
0%{transform:scale(0.6);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

ul{
list-style:none;
padding:0;
}

li{
margin:12px;
font-size:18px;
}

a{
text-decoration:none;
color:#333;
font-weight:bold;
}

a:hover{
color:red;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
}

.star{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

</style>

</head>

<body>

<h1>{{ title }}</h1>

<div class="container">

<div class="card">

<ul>

{% for item in items %}

<li>
<a href="{{ item.link }}" target="_blank">
{{ item.name }}
</a>
</li>

{% endfor %}

</ul>

<a href="/">
<button>Back</button>
</a>

</div>

</div>


<script>

/* create twinkling stars */

for(let i=0;i<80;i++){

let star=document.createElement("div");

star.className="star";

star.style.top=Math.random()*100+"%";

star.style.left=Math.random()*100+"%";

star.style.animationDuration=(Math.random()*3+1)+"s";

document.body.appendChild(star);

}

</script>

</body>

</html>
